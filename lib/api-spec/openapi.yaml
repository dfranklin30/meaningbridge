          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /professional/patients/{id}/assistant:
    post:
      operationId: askProviderAssistant
      tags: [professional]
      summary: Ask the MeaningBridge provider assistant about a patient. Answers from metadata only.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProviderAssistantInput" }
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderAssistantReply" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /professional/patients/{id}/appointments:
    get:
      operationId: listPatientAppointments
      tags: [professional]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Appointment" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    post:
      operationId: proposeAppointment
      tags: [professional]
      summary: Propose a session time; emails the patient a confirm/decline link and mirrors to calendar when connected.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppointmentInput" }
      responses:
        "201":
          description: Proposed appointment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /professional/appointments/{id}:
    patch:
      operationId: editAppointment
      tags: [professional]
      summary: Edit a proposed/confirmed session's time, title, or location; keeps the mirrored calendar event in sync.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppointmentEditInput" }
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
        "409":
          description: Appointment can no longer be edited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /professional/appointments/{id}/cancel:
    post:
      operationId: cancelAppointment
      tags: [professional]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled appointment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /professional/calendar:
    get:
      operationId: getProviderCalendar
      tags: [professional]
      summary: The provider's calendar-sync setting and whether Google Calendar is connected.
      responses:
        "200":
          description: Calendar setting
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderCalendar" }
    put:
      operationId: updateProviderCalendar
      tags: [professional]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProviderCalendarInput" }
      responses:
        "200":
          description: Updated calendar setting
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProviderCalendar" }

  /professional/calendar/list:
    get:
      operationId: listProviderCalendars
      tags: [professional]
      summary: The Google calendars the connected account can write to, for choosing a sync target.
      responses:
        "200":
          description: Available writable calendars (empty when not connected)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CalendarChoice" }

  /appointments/{token}:
    get:
      operationId: getAppointmentByToken
      tags: [appointments]
      summary: Public, token-gated view of a proposed appointment for the patient to confirm or decline.
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Appointment public view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppointmentPublicView" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    post:
      operationId: respondToAppointment
      tags: [appointments]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppointmentRespondInput" }
      responses:
        "200":
          description: Updated appointment public view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppointmentPublicView" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

components:
  schemas:
    CompanionMemory:
      type: object
      properties:
        id: { type: integer }
        content: { type: string }
        category: { type: string }
        source: { type: string, enum: [companion, user] }
        createdAt: { type: string, format: date-time }
      required: [id, content, category, source, createdAt]

    CompanionMemoryInput:
      type: object
      properties:
        content: { type: string, minLength: 1 }
        category: { type: string }
      required: [content]

    CompanionTask:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        body: { type: ["string", "null"] }
        practiceSlug: { type: ["string", "null"] }
        status: { type: string, enum: [suggested, active, completed, dismissed] }
        source: { type: string, enum: [companion, user] }
        dueAt: { type: ["string", "null"], format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, title, status, source, createdAt]

    CompanionTaskInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        body: { type: string }
        practiceSlug: { type: string }
        dueAt: { type: string, format: date-time }
        status: { type: string, enum: [suggested, active, completed, dismissed] }
      required: [title]

    CompanionTaskUpdate:
      type: object
      properties:
        status: { type: string, enum: [suggested, active, completed, dismissed] }
        dueAt: { type: ["string", "null"], format: date-time }

    OutreachPreferences:
      type: object
      properties:
        checkinsEnabled: { type: boolean }
        cadenceDays: { type: integer }
        taskRemindersEnabled: { type: boolean }
        quietStartHour: { type: integer }
        quietEndHour: { type: integer }
        timezone: { type: string }
        channel: { type: string, enum: [email, sms] }
        paused: { type: boolean }
        phone: { type: ["string", "null"], description: Verified mobile number (E.164) used for SMS outreach. }
        phoneVerified: { type: boolean, description: Whether the phone number has completed one-time-code verification. }
        pendingPhone: { type: ["string", "null"], description: A number awaiting verification, if a code has been sent. }
        lastCheckinAt: { type: ["string", "null"], format: date-time }
      required:
        [checkinsEnabled, cadenceDays, taskRemindersEnabled, quietStartHour, quietEndHour, timezone, channel, paused, phoneVerified]

    OutreachPreferencesInput:
      type: object
      properties:
        checkinsEnabled: { type: boolean }
        cadenceDays: { type: integer, minimum: 1, maximum: 90 }
        taskRemindersEnabled: { type: boolean }
        quietStartHour: { type: integer, minimum: 0, maximum: 23 }
        quietEndHour: { type: integer, minimum: 0, maximum: 23 }
        timezone: { type: string }
        channel: { type: string, enum: [email, sms] }
        paused: { type: boolean }

    PhoneVerificationStartInput:
      type: object
      properties:
        phone: { type: string, minLength: 3, description: Mobile number in E.164 or a locally-formatted number to be normalized. }
      required: [phone]

    PhoneVerificationStartResult:
      type: object
      properties:
        pendingPhone: { type: string, description: The normalized number the code was sent to. }
        sent: { type: boolean, description: Whether the SMS with the code was actually dispatched. }
        expiresAt: { type: string, format: date-time }
      required: [pendingPhone, sent, expiresAt]

    PhoneVerificationConfirmInput:
      type: object
      properties:
        code: { type: string, minLength: 4, maxLength: 8 }
      required: [code]

    PatientEngagement:
      type: object
      description: Metadata-only engagement + safety signals. Contains counts and timestamps, never any patient content.
      properties:
        patientId: { type: integer }
        status: { type: string }
        tier: { type: ["string", "null"] }
        sessionCount: { type: integer }
        lastActiveAt: { type: ["string", "null"], format: date-time }
        companionMessageCount: { type: integer }
        journalEntryCount: { type: integer }
        checkinCount: { type: integer }
        lastCheckinAt: { type: ["string", "null"], format: date-time }
        safetyEventCount: { type: integer }
        openSafetyEventCount: { type: integer }
        lastSafetyEventAt: { type: ["string", "null"], format: date-time }
      required:
        [patientId, status, sessionCount, companionMessageCount, journalEntryCount, checkinCount, safetyEventCount, openSafetyEventCount]

    ProviderAssistantInput:
      type: object
      properties:
        question: { type: string, minLength: 1 }
      required: [question]

    ProviderAssistantReply:
      type: object
      properties:
        answer: { type: string }
      required: [answer]

    Appointment:
      type: object
      properties:
        id: { type: integer }
        patientId: { type: integer }
        providerUserId: { type: integer }
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        status: { type: string, enum: [proposed, confirmed, declined, cancelled] }
        location: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        googleEventId: { type: ["string", "null"] }
        calendarSyncStatus:
          type: ["string", "null"]
          enum: [synced, fallback, failed, null]
          description: >-
            Outcome of the last attempt to mirror this session onto the
            provider's Google Calendar. null when sync was off or not connected.
        calendarSyncMessage:
          type: ["string", "null"]
          description: >-
            A calm, provider-facing explanation shown when calendarSyncStatus is
            "fallback" or "failed". null otherwise.
        createdAt: { type: string, format: date-time }
      required: [id, patientId, providerUserId, title, startsAt, endsAt, status, createdAt]

    AppointmentInput:
      type: object
      properties:
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        location: { type: string }
        notes: { type: string }
      required: [startsAt, endsAt]

    AppointmentEditInput:
      type: object
      description: Fields a provider may change on a still-editable session. All optional; only provided fields are updated.
      properties:
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        location: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    AppointmentPublicView:
      type: object
      description: The limited, no-login view a patient sees when confirming an appointment.
      properties:
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        status: { type: string, enum: [proposed, confirmed, declined, cancelled] }
        providerName: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
      required: [title, startsAt, endsAt, status]

    AppointmentRespondInput:
      type: object
      properties:
        decision: { type: string, enum: [confirm, decline] }
      required: [decision]

    ProviderCalendar:
      type: object
      properties:
        provider: { type: string }
        calendarId: { type: string }
        syncEnabled: { type: boolean }
        connected: { type: boolean, description: Whether a Google Calendar account is connected at the platform level. }
      required: [provider, calendarId, syncEnabled, connected]

    ProviderCalendarInput:
      type: object
      properties:
        calendarId: { type: string }
        syncEnabled: { type: boolean }

    CalendarChoice:
      type: object
      properties:
        id: { type: string }
        summary: { type: string }
        primary: { type: boolean }
      required: [id, summary, primary]

    ProfessionalMeta:
      type: object
      description: Static reference data shared by the provider onboarding, intake, and integrations UIs.
      properties:
        credentials:
          type: array
          items: { type: string }
        specialtyTags:
          type: array
          items: { type: string }
        causeOfLossCategories:
          type: array
          items: { type: string }
        integrationSystems:
          type: array
          items: { $ref: "#/components/schemas/IntegrationSystemOption" }
        consentDocumentVersion: { type: string }
      required: [credentials, specialtyTags, causeOfLossCategories, integrationSystems, consentDocumentVersion]

    IntegrationSystemOption:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        kind: { type: string, enum: [fhir, csv_preset, vendor_api] }
      required: [id, label, kind]

    Provider:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        fullName: { type: ["string", "null"] }
        credential: { type: ["string", "null"] }
        licenseNumber: { type: ["string", "null"] }
        licenseState: { type: ["string", "null"] }
        npi: { type: ["string", "null"] }
        practiceName: { type: ["string", "null"] }
        practiceAddress: { type: ["string", "null"] }
        verificationStatus: { type: string, enum: [pending, verified, rejected] }
        verifiedAt: { type: ["string", "null"], format: date-time }
        directoryOptIn: { type: boolean }
        specialtyTags: { type: array, items: { type: string } }
        statesLicensed: { type: array, items: { type: string } }
        telehealth: { type: boolean }
        acceptingReferrals: { type: boolean }
        bio: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, userId, verificationStatus, directoryOptIn, specialtyTags, statesLicensed, telehealth, acceptingReferrals, createdAt, updatedAt]

    ProviderInput:
      type: object
      description: Provider profile fields a clinician submits at onboarding (verification is server-controlled).
      properties:
        fullName: { type: string, minLength: 1 }
        credential: { type: string }
        licenseNumber: { type: string }
        licenseState: { type: string }
        npi: { type: string }
        practiceName: { type: string }
        practiceAddress: { type: string }
        directoryOptIn: { type: boolean }
        specialtyTags: { type: array, items: { type: string } }
        statesLicensed: { type: array, items: { type: string } }
        telehealth: { type: boolean }
        acceptingReferrals: { type: boolean }
        bio: { type: string }
      required: [fullName]

    NpiLookupResult:
      type: object
      properties:
        npi: { type: string }
        formatValid: { type: boolean }
        checksumValid: { type: boolean }
        valid: { type: boolean }
        registry:
          type: object
          properties:
            found: { type: boolean }
            name: { type: string }
            credential: { type: string }
            primaryTaxonomy: { type: string }
            state: { type: string }
            enumerationType: { type: string }
          required: [found]
      required: [npi, formatValid, checksumValid, valid]

    SecurityStatus:
      type: object
      properties:
        totpEnabled: { type: boolean }
        twoFactorActive: { type: boolean }
        recoveryCodesRemaining: { type: integer }
        idleTimeoutMinutes: { type: integer }
      required: [totpEnabled, twoFactorActive, recoveryCodesRemaining, idleTimeoutMinutes]

    TotpSetup:
      type: object
      properties:
        secret: { type: string }
        otpauthUri: { type: string }
      required: [secret, otpauthUri]

    TotpCodeInput:
      type: object
      properties:
        code: { type: string, minLength: 1 }
      required: [code]

    TotpChallengeInput:
      type: object
      description: Provide either a current authenticator code or a one-time recovery code.
      properties:
        code: { type: string }
        recoveryCode: { type: string }

    TotpEnableResult:
      type: object
      properties:
        recoveryCodes: { type: array, items: { type: string } }
      required: [recoveryCodes]

    OkResult:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    DirectoryEntry:
      type: object
      description: Non-PHI professional profile shown in the colleague directory.
      properties:
        userId: { type: integer }
        fullName: { type: ["string", "null"] }
        credential: { type: ["string", "null"] }
        practiceName: { type: ["string", "null"] }
        specialtyTags: { type: array, items: { type: string } }
        statesLicensed: { type: array, items: { type: string } }
        telehealth: { type: boolean }
        acceptingReferrals: { type: boolean }
        bio: { type: ["string", "null"] }
      required: [userId, specialtyTags, statesLicensed, telehealth, acceptingReferrals]

    AdminProviderListItem:
      allOf:
        - $ref: "#/components/schemas/Provider"
        - type: object
          properties:
            userEmail: { type: ["string", "null"] }
            userFirstName: { type: ["string", "null"] }

    ProviderDecisionInput:
      type: object
      properties:
        action: { type: string, enum: [approve, reject] }
        note: { type: string }
      required: [action]

    PatientSummary:
      type: object
      description: Minimum-necessary view of a patient shown to a provider — decrypted identity plus engagement metadata, never conversation content.
      properties:
        id: { type: integer }
        firstName: { type: ["string", "null"] }
        lastName: { type: ["string", "null"] }
        pronouns: { type: ["string", "null"] }
        status: { type: string, enum: [draft, invited, consented, active, revoked, inactive] }
        isDemoSample: { type: boolean }
        sessionCount: { type: integer }
        lastActiveAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, status, isDemoSample, sessionCount, createdAt]

    PatientInput:
      type: object
      description: Identifying PHI for a patient. Encrypted at rest server-side.
      properties:
        firstName: { type: string, minLength: 1 }
        lastName: { type: string }
        dob: { type: string, description: "ISO date (YYYY-MM-DD)" }
        email: { type: string, format: email }
        phone: { type: string }
        pronouns: { type: string }
      required: [firstName]

    Intake:
      type: object
      properties:
        id: { type: integer }
        providerUserId: { type: integer }
        patientId: { type: ["integer", "null"] }
        status: { type: string, enum: [draft, submitted] }
        data:
          type: object
          additionalProperties: true
          description: Decrypted intake payload (server encrypts it at rest).
        riskFlag: { type: boolean }
        safetyPlanConfirmed: { type: boolean }
        submittedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, providerUserId, status, riskFlag, safetyPlanConfirmed, createdAt, updatedAt]

    IntakeInput:
      type: object
      properties:
        patientId: { type: integer }
        status: { type: string, enum: [draft, submitted] }
        data: { type: object, additionalProperties: true }
        riskFlag: { type: boolean }
        safetyPlanConfirmed: { type: boolean }
      required: [data]

    Consent:
      type: object
      properties:
        id: { type: integer }
        patientId: { type: integer }
        type: { type: string }
        documentVersion: { type: ["string", "null"] }
        signedAt: { type: ["string", "null"], format: date-time }
        revokedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, patientId, type, createdAt]

    ConsentInput:
      type: object
      description: A patient e-signing consent. The typed signature name is stored encrypted.
      properties:
        consentToken: { type: string, minLength: 1 }
        signerName: { type: string, minLength: 1 }
        documentVersion: { type: string }
      required: [consentToken, signerName]

    BatchImport:
      type: object
      properties:
        id: { type: integer }
        filename: { type: ["string", "null"] }
        source: { type: string }
        totalRows: { type: integer }
        acceptedRows: { type: integer }
        rejectedRows: { type: integer }
        report:
          type: ["array", "null"]
          items:
            type: object
            properties:
              row: { type: integer }
              ok: { type: boolean }
              reason: { type: string }
            required: [row, ok]
        createdAt: { type: string, format: date-time }
      required: [id, source, totalRows, acceptedRows, rejectedRows, createdAt]

    Referral:
      type: object
      properties:
        id: { type: integer }
        patientId: { type: integer }
        fromProviderUserId: { type: integer }
        toProviderUserId: { type: integer }
        status: { type: string, enum: [pending, accepted, declined] }
        summary: { type: ["string", "null"], description: "Decrypted intake summary." }
        respondedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        fromProviderName: { type: ["string", "null"], description: "Present on list responses." }
        toProviderName: { type: ["string", "null"], description: "Present on list responses." }
        patientLabel: { type: ["string", "null"], description: "Patient first name; present on list responses." }
      required: [id, patientId, fromProviderUserId, toProviderUserId, status, createdAt]

    ReferralInput:
      type: object
      properties:
        patientId: { type: integer }
        toProviderUserId: { type: integer }
        summary: { type: string }
      required: [patientId, toProviderUserId]

    ReferralMessage:
      type: object
      properties:
        id: { type: integer }
        referralId: { type: integer }
        senderUserId: { type: integer }
        body: { type: string, description: "Decrypted message body." }
        createdAt: { type: string, format: date-time }
      required: [id, referralId, senderUserId, body, createdAt]

    ReferralMessageInput:
      type: object
      properties:
        body: { type: string, minLength: 1 }
      required: [body]

    IntegrationConnection:
      type: object
      properties:
        id: { type: integer }
        system: { type: string }
        kind: { type: string, enum: [fhir, csv_preset, vendor_api] }
        status: { type: string, enum: [connected, disconnected, pending] }
        scopes: { type: ["string", "null"] }
        fhirBaseUrl: { type: ["string", "null"] }
        connectedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, system, kind, status, createdAt, updatedAt]

    IntegrationConnectionInput:
      type: object
      description: Fields to create/update a provider's EHR/practice-system connection. Tokens are encrypted at rest.
      properties:
        system: { type: string, minLength: 1 }
        kind: { type: string, enum: [fhir, csv_preset, vendor_api] }
        status: { type: string, enum: [connected, disconnected, pending] }
        scopes: { type: string }
        fhirBaseUrl: { type: string }
        accessToken: { type: string }
        refreshToken: { type: string }
      required: [system]

    ReferralRespondInput:
      type: object
      properties:
        action: { type: string, enum: [accept, decline] }
      required: [action]

    BatchImportInput:
      type: object
      properties:
        filename: { type: string }
        source: { type: string, minLength: 1 }
        totalRows: { type: integer }
        acceptedRows: { type: integer }
        rejectedRows: { type: integer }
        report:
          type: array
          items:
            type: object
            properties:
              row: { type: integer }
              ok: { type: boolean }
              reason: { type: string }
            required: [row, ok]
      required: [source]

    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    AnthropicError:
      type: object
      properties:
        error: { type: string }
      required: [error]

    TranscriptionResult:
      type: object
      properties:
