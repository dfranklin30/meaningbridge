      type: object
      description: IDWL companion items on the Dual Process oscillation.
      properties:
        awarenessLoss: { type: integer, minimum: 1, maximum: 5, description: "C1 attention to grief/emotions" }
        awarenessRestoration: { type: integer, minimum: 1, maximum: 5, description: "C2 attention to new responsibilities" }
        oscillationFrequency: { type: integer, minimum: 0, maximum: 4, description: "C3 how often gone back and forth (0=only one issue .. 4=several times each day)" }
        control: { type: integer, minimum: 1, maximum: 5, description: "C4 control over going back and forth" }
      required: [awarenessLoss, awarenessRestoration, oscillationFrequency, control]
