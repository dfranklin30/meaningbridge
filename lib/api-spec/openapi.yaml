    GisSubmission:
      type: object
      description: Five integers 0-4 keyed by GIS item id (1-5).
      properties:
        item1: { type: integer, minimum: 0, maximum: 4 }
        item2: { type: integer, minimum: 0, maximum: 4 }
        item3: { type: integer, minimum: 0, maximum: 4 }
        item4: { type: integer, minimum: 0, maximum: 4 }
        item5: { type: integer, minimum: 0, maximum: 4 }
      required: [item1, item2, item3, item4, item5]
    GisResult:
      type: object
      properties:
        id: { type: integer }
        score: { type: integer }
        tier:
          type: string
          enum: ["universal", "targeted", "clinical"]
        cutPointFlag: { type: boolean, description: "True if total >= 9 (clinical cut-score)" }
        safetyFlag: { type: boolean, description: "True if item 3 >= 2 (self-destructive coping)" }
        itemResponses:
          type: object
          additionalProperties: { type: integer }
        completedAt: { type: string, format: date-time }
      required: [id, score, tier, cutPointFlag, safetyFlag, itemResponses, completedAt]

    GmriSubmission:
      type: object
      description: 29 integers (1-5) in item order, one per GMRI statement.
      properties:
        responses:
          type: array
          items: { type: integer, minimum: 1, maximum: 5 }
          minItems: 29
          maxItems: 29
      required: [responses]
    GmriFactors:
      type: object
      description: Factor means on the 1-5 scale (all oriented so higher = healthier; emptiness is reverse-scored).
      properties:
        continuingBonds: { type: number }
        personalGrowth: { type: number }
        senseOfPeace: { type: number }
        emptiness: { type: number }
        valuingLife: { type: number }
      required: [continuingBonds, personalGrowth, senseOfPeace, emptiness, valuingLife]
    GmriResult:
      type: object
      properties:
        id: { type: integer }
        total: { type: integer, description: "Meaning-reconstruction total (29-145), emptiness items reverse-scored." }
        factors: { $ref: "#/components/schemas/GmriFactors" }
        responses:
          type: array
          items: { type: integer }
        completedAt: { type: string, format: date-time }
      required: [id, total, factors, responses, completedAt]

