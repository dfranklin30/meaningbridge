      type: object
      description: 22 integers (1-4) in item order plus companion items.
      properties:
        responses:
          type: array
          items: { type: integer, minimum: 1, maximum: 4 }
          minItems: 22
          maxItems: 22
        companion: { $ref: "#/components/schemas/IdwlCompanion" }
      required: [responses, companion]
    IdwlResult:
      type: object
      properties:
        id: { type: integer }
        lossOriented: { type: integer, description: "Sum of items 1-11 (11-44)" }
        restorationOriented: { type: integer, description: "Sum of items 12-22 (11-44)" }
        balance: { type: integer, description: "restorationOriented - lossOriented (-33..33)" }
        companion: { $ref: "#/components/schemas/IdwlCompanion" }
        responses:
          type: array
          items: { type: integer }
        completedAt: { type: string, format: date-time }
      required: [id, lossOriented, restorationOriented, balance, companion, responses, completedAt]

