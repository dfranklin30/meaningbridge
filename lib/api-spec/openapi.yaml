openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MeaningBridge API — grief support, continuing bonds, journaling, assessments
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: profile
    description: User profile, onboarding, deceased profile
  - name: chat
    description: Grief support chat sessions
  - name: journal
    description: Journaling
  - name: assessments
    description: Self-assessment check-ins
  - name: practices
    description: Self-guided practices and resources
  - name: dashboard
    description: Dashboard summaries and trends
  - name: safety
    description: Safety and crisis events
  - name: notify
    description: Public launch-notification opt-in list
  - name: account
    description: Current authenticated account (identity and role)
  - name: voice
    description: Voice-to-text transcription
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: professional
    description: Professional (clinician) portal — providers, patients, intake, consent, referrals, integrations
  - name: companion
    description: Companion agent — durable memory, gentle task invitations, and proactive outreach preferences
  - name: appointments
    description: Public, token-gated appointment confirmation for patients
paths:
  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Current authenticated account (identity + chosen role)
      responses:
        "200":
          description: Current account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
    patch:
      operationId: updateMe
      tags: [account]
      summary: Set the account role and/or display name (used after sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInput"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and stream the AI response (SSE)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /deceased:
    get:
      operationId: listDeceasedProfiles
      tags: [profile]
      responses:
        "200":
          description: All deceased profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeceasedProfile"
    post:
      operationId: createDeceasedProfile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeceasedProfileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeceasedProfile"
  /deceased/{id}:
    get:
      operationId: getDeceasedProfile
      tags: [profile]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deceased profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeceasedProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    put:
      operationId: updateDeceasedProfile
      tags: [profile]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeceasedProfileInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeceasedProfile"
    delete:
      operationId: deleteDeceasedProfile
      tags: [profile]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      responses:
        "200":
          description: All chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"
  /chat/sessions/{id}:
    get:
      operationId: getChatSession
      tags: [chat]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Chat session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    delete:
      operationId: deleteChatSession
      tags: [chat]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /chat/sessions/{id}/messages:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message and stream the AI response (SSE)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /concierge/message:
    post:
      operationId: sendConciergeMessage
      tags: [concierge]
      summary: Public product concierge — stream a reply (SSE, no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConciergeMessageInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /professional/general-assistant:
    post:
      operationId: sendProviderGeneralAssistantMessage
      tags: [professional]
      summary: Clinician portal help — stream a reply (SSE, no patient data)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderGeneralAssistantInput"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      responses:
        "200":
          description: All journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
  /journal/{id}:
    get:
      operationId: getJournalEntry
      tags: [journal]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    put:
      operationId: updateJournalEntry
      tags: [journal]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /journal/prompts:
    get:
      operationId: listJournalPrompts
      tags: [journal]
      summary: Curated journaling prompts grouped by category
      responses:
        "200":
          description: Prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalPrompt"

  /journal/{id}/reflect:
    post:
      operationId: reflectOnJournalEntry
      tags: [journal]
      summary: Offer a gentle AI reflection on an entry and run safety screening.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reflection and screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalReflectionResult"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }

  /journal/{entryId}/photos:
    get:
      operationId: listJournalPhotos
      tags: [journal]
      summary: List photos attached to a journal entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Photos for the entry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalPhoto"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    post:
      operationId: addJournalPhoto
      tags: [journal]
      summary: Attach an uploaded photo to a journal entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalPhotoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalPhoto"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
  /journal/photos/{photoId}:
    delete:
      operationId: deleteJournalPhoto
      tags: [journal]
      summary: Remove a photo from a journal entry
      parameters:
        - name: photoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /assessments/gis:
    post:
      operationId: submitGisScreener
      tags: [assessments]
      summary: Submit the 5-item Grief Impairment Scale (Lee & Neimeyer 2022). Scores, assigns a care tier, and logs a safety event if item 3 indicates self-destructive coping.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GisSubmission"
      responses:
        "200":
          description: Screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GisResult"
    get:
      operationId: listGisResults
      tags: [assessments]
      summary: History of GIS screenings (most recent first)
      responses:
        "200":
          description: GIS history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GisResult"

  /assessments/gmri:
    post:
      operationId: submitGmri
      tags: [assessments]
      summary: Submit the 29-item Grief & Meaning Reconstruction Inventory (Neimeyer, public domain). Scores five factors and a meaning-reconstruction total; reflective only (does not change care tier).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GmriSubmission"
      responses:
        "200":
          description: GMRI result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmriResult"
    get:
      operationId: listGmriResults
      tags: [assessments]
      summary: History of GMRI reflections (most recent first)
      responses:
        "200":
          description: GMRI history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GmriResult"

  /assessments/idwl:
    post:
      operationId: submitIdwl
      tags: [assessments]
      summary: Submit the 22-item Inventory of Daily Widowed Life (Caserta & Lund, public domain). Scores loss- vs restoration-oriented subscales and oscillation balance; reflective only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdwlSubmission"
      responses:
        "200":
          description: IDWL result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdwlResult"
    get:
      operationId: listIdwlResults
      tags: [assessments]
      summary: History of IDWL reflections (most recent first)
      responses:
        "200":
          description: IDWL history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdwlResult"

  /assessments/checkins:
    get:
      operationId: listCheckIns
      tags: [assessments]
      responses:
        "200":
          description: Check-in history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckIn"
    post:
      operationId: createCheckIn
      tags: [assessments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"

  /practices:
    get:
      operationId: listPractices
      tags: [practices]
      summary: Self-guided practice library (breathwork, meditation, art prompts, rituals)
      responses:
        "200":
          description: Practices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Practice"
    post:
      operationId: createPractice
      tags: [practices]
      summary: Create a practice (authenticated editor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Practice"
  /practices/{id}:
    get:
      operationId: getPractice
      tags: [practices]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Practice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Practice"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    put:
      operationId: updatePractice
      tags: [practices]
      summary: Update a practice (authenticated editor)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Practice"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
    delete:
      operationId: deletePractice
      tags: [practices]
      summary: Delete a practice (authenticated editor)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /resources/therapists:
    get:
      operationId: findTherapists
      tags: [practices]
      summary: Therapist directory placeholder (Portland Institute–style)
      parameters:
        - name: zip
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Therapist results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Therapist"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Headline numbers, recent activity, suggested next exercises
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/trends:
    get:
      operationId: getDashboardTrends
      tags: [dashboard]
      summary: Time-series of distress, meaning, connection, functioning
      responses:
        "200":
          description: Trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardTrends"

  /safety/events:
    get:
      operationId: listSafetyEvents
      tags: [safety]
      responses:
        "200":
          description: Safety events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafetyEvent"
    post:
      operationId: createSafetyEvent
      tags: [safety]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafetyEventInput"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyEvent"
  /safety/resources:
    get:
      operationId: getSafetyResources
      tags: [safety]
      summary: Crisis hotlines and immediate help cards
      responses:
        "200":
          description: Crisis resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrisisResource"

  /notify:
    post:
      operationId: createNotifyOptIn
      tags: [notify]
      summary: Public launch notification signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotifyOptInInput"
      responses:
        "200":
          description: Subscribed (or already on the list)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyOptInResult"
    get:
      operationId: listNotifyOptIns
      tags: [notify]
      summary: Admin export of launch-notification signups
      responses:
        "200":
          description: All signups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotifyOptIn"

  /feedback:
    post:
      operationId: createSandboxFeedback
      tags: [feedback]
      summary: Submit sandbox experience feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxFeedbackInput"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxFeedbackResult"
    get:
      operationId: listSandboxFeedback
      tags: [feedback]
      summary: Admin export of sandbox feedback
      responses:
        "200":
          description: All feedback
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SandboxFeedback"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [Storage]
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
        "500":
          description: Failed to generate upload URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
  /storage/public-objects/{filePath}:
    get:
      operationId: getPublicObject
      tags: [Storage]
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema: { type: string }
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404":
          description: File not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
        "500":
          description: Failed to serve public object
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnthropicError" }
